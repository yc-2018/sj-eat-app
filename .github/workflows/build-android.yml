name: 打包安卓应用

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5

      - name: 为 Android SDK 工具准备 Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 安装 Android SDK 命令行工具
        uses: android-actions/setup-android@v3

      - name: 接受 Android SDK 许可协议
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: 安装 Android 构建依赖
        run: sdkmanager "platforms;android-29" "build-tools;29.0.3" "platform-tools"

      - name: 切换到 Java 11 执行 Gradle 构建
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: 生成发行版信息
        id: release_meta
        shell: bash
        run: |
          qr_label=$(grep '^qrLabel=' gradle.properties | cut -d= -f2- || true)
          if [ -z "$qr_label" ]; then
            qr_label="E0254"
          fi
          timestamp=$(date -u +"%Y%m%d-%H%M%S")
          short_sha="${GITHUB_SHA::7}"
          echo "qr_label=$qr_label" >> "$GITHUB_OUTPUT"
          echo "timestamp=$timestamp" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release_meta.outputs.qr_label }}-安卓调试安装包
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: 发布到 GitHub 发行版
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: build-${{ steps.release_meta.outputs.qr_label }}-${{ steps.release_meta.outputs.timestamp }}-${{ steps.release_meta.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_meta.outputs.qr_label }} 调试安装包 ${{ steps.release_meta.outputs.timestamp }}
          body: |
            为 ${{ steps.release_meta.outputs.qr_label }} 专门打造的自动打包 Debug APK。
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
            构建时间：${{ steps.release_meta.outputs.timestamp }} UTC
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: false

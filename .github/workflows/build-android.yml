name: 打包安卓应用

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v5

      - name: 为 Android SDK 工具准备 Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 安装 Android SDK 命令行工具
        uses: android-actions/setup-android@v3

      - name: 接受 Android SDK 许可协议
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: 安装 Android 构建依赖
        run: sdkmanager "platforms;android-29" "build-tools;29.0.3" "platform-tools"

      - name: 切换到 Java 11 执行 Gradle 构建
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '11'
          cache: gradle

      - name: 授予 Gradle Wrapper 执行权限
        run: chmod +x gradlew

      - name: 构建 Debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: 上传 APK 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 安卓调试安装包
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: 发布到 GitHub 发行版
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: latest-build
          target_commitish: ${{ github.sha }}
          name: 最新调试安装包
          body: |
            自动打包生成的 Debug APK。
            分支：${{ github.ref_name }}
            提交：${{ github.sha }}
          files: app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: false
          overwrite_files: true
